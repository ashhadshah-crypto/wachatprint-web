<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WAChatPrint</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .box {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      text-align: center;
      max-width: 600px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 36px;
    }
    p {
      font-size: 18px;
      color: #444;
      line-height: 1.6;
    }
    .small {
      margin-top: 20px;
      font-size: 14px;
      color: #777;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>WAChatPrint</h1>
    <p>Convert exported WhatsApp chats into clean, downloadable PDFs.</p>
    <p class="small">Website is under setup. Coming soon.</p>
  </div>
</body>
</html>
