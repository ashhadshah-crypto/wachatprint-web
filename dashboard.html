<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WAChatPrint - Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f8fafc;
      color: #0f172a;
      min-height: 100vh;
      padding: 24px;
    }

    .wrap { max-width: 960px; margin: 0 auto; }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .logo { font-size: 24px; font-weight: 700; }

    .btn {
      border: none;
      background: #2563eb;
      color: white;
      padding: 12px 18px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
    }

    .btn:hover { background: #1d4ed8; }

    .btn-secondary {
      background: #e2e8f0;
      color: #0f172a;
    }

    .btn-secondary:hover { background: #cbd5e1; }

    .card {
      background: white;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
      margin-bottom: 20px;
    }

    h1 { font-size: 30px; margin-bottom: 10px; }
    h2 { font-size: 22px; margin-bottom: 12px; }

    p {
      color: #475569;
      line-height: 1.6;
    }

    .status {
      margin-top: 10px;
      font-size: 15px;
      color: #15803d;
      font-weight: 600;
    }

    .upload-box {
      margin-top: 20px;
      padding: 24px;
      border: 2px dashed #cbd5e1;
      border-radius: 16px;
      background: #f8fafc;
    }

    .upload-box input[type="file"] {
      display: block;
      margin-top: 14px;
      margin-bottom: 16px;
      width: 100%;
    }

    .note {
      font-size: 14px;
      color: #64748b;
      margin-top: 8px;
    }

    .file-info {
      margin-top: 16px;
      padding: 16px;
      border-radius: 12px;
      background: #eff6ff;
      color: #1e3a8a;
      font-size: 14px;
      line-height: 1.7;
      display: none;
    }

    .message {
      margin-top: 16px;
      font-size: 14px;
      font-weight: 600;
      line-height: 1.6;
    }

    .success { color: #15803d; }
    .error { color: #dc2626; }
    .muted { color: #64748b; }

    .actions {
      margin-top: 18px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="logo">WAChatPrint</div>
      <button class="btn" id="logoutBtn">Logout</button>
    </div>

    <div class="card">
      <h1>Welcome</h1>
      <p id="userEmail">Checking your session...</p>
      <div class="status">Your account is active.</div>
    </div>

    <div class="card">
      <h2>Upload WhatsApp Export</h2>
      <p>
        Upload your exported WhatsApp chat file. Free users can upload
        files up to 5 MB in <strong>.zip</strong> or <strong>.txt</strong> format.
      </p>

      <div class="upload-box">
        <label for="chatFile"><strong>Select file</strong></label>
        <input type="file" id="chatFile" accept=".zip,.txt" />

        <div class="note">
          Allowed formats: .zip, .txt<br />
          Free size limit: 5 MB
        </div>

        <div class="file-info" id="fileInfo"></div>

        <div class="actions">
          <button class="btn" id="checkBtn" type="button">Validate File</button>
          <button class="btn" id="uploadBtn" type="button">Upload File</button>
          <button class="btn btn-secondary" id="clearBtn" type="button">Clear</button>
        </div>

        <div class="message muted" id="uploadMessage">
          No file selected yet.
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const supabaseUrl = 'https://owlzekmxjuaqxyqbssit.supabase.co';
    const supabaseKey = 'sb_publishable_GjhNJ7BAtIG4Rk9qvGFk3w_7hVgqDJF';

    const supabase = createClient(supabaseUrl, supabaseKey);

    const userEmail = document.getElementById('userEmail');
    const logoutBtn = document.getElementById('logoutBtn');
    const chatFile = document.getElementById('chatFile');
    const fileInfo = document.getElementById('fileInfo');
    const uploadMessage = document.getElementById('uploadMessage');
    const checkBtn = document.getElementById('checkBtn');
    const uploadBtn = document.getElementById('uploadBtn');
    const clearBtn = document.getElementById('clearBtn');

    const MAX_SIZE = 5 * 1024 * 1024;
    const ALLOWED_EXTENSIONS = ['zip', 'txt'];

    let currentUser = null;
    let validatedFile = null;

    async function loadUser() {
      const { data, error } = await supabase.auth.getUser();

      if (error || !data.user) {
        window.location.href = '/auth.html?mode=login';
        return;
      }

      currentUser = data.user;
      userEmail.textContent = `Logged in as: ${data.user.email}`;
    }

    function formatFileSize(bytes) {
      if (bytes < 1024) return `${bytes} bytes`;
      if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(2)} KB`;
      return `${(bytes / (1024 * 1024)).toFixed(2)} MB`;
    }

    function resetFileView() {
      validatedFile = null;
      chatFile.value = '';
      fileInfo.style.display = 'none';
      fileInfo.innerHTML = '';
      uploadMessage.textContent = 'No file selected yet.';
      uploadMessage.className = 'message muted';
    }

    function getSelectedFile() {
      return chatFile.files[0] || null;
    }

    function validateSelectedFile() {
      const file = getSelectedFile();

      validatedFile = null;

      if (!file) {
        uploadMessage.textContent = 'Please select a file first.';
        uploadMessage.className = 'message error';
        fileInfo.style.display = 'none';
        return false;
      }

      const fileName = file.name;
      const extension = fileName.split('.').pop().toLowerCase();

      if (!ALLOWED_EXTENSIONS.includes(extension)) {
        uploadMessage.textContent = 'Invalid file type. Please upload only .zip or .txt files.';
        uploadMessage.className = 'message error';
        fileInfo.style.display = 'none';
        return false;
      }

      if (file.size > MAX_SIZE) {
        uploadMessage.textContent = 'File is too large. Free limit is 5 MB.';
        uploadMessage.className = 'message error';
        fileInfo.style.display = 'block';
        fileInfo.innerHTML = `
          <strong>Selected File:</strong> ${file.name}<br>
          <strong>Size:</strong> ${formatFileSize(file.size)}<br>
          <strong>Status:</strong> Over free limit
        `;
        return false;
      }

      validatedFile = file;

      fileInfo.style.display = 'block';
      fileInfo.innerHTML = `
        <strong>Selected File:</strong> ${file.name}<br>
        <strong>Type:</strong> .${extension}<br>
        <strong>Size:</strong> ${formatFileSize(file.size)}<br>
        <strong>Status:</strong> Valid for upload
      `;

      uploadMessage.textContent = 'File looks good. You can upload it now.';
      uploadMessage.className = 'message success';
      return true;
    }

    function safeFileName(name) {
      return name.replace(/[^a-zA-Z0-9._-]/g, '_');
    }

    async function uploadFile() {
      if (!currentUser) {
        uploadMessage.textContent = 'Please log in again.';
        uploadMessage.className = 'message error';
        return;
      }

      const ok = validateSelectedFile();
      if (!ok || !validatedFile) return;

      const originalName = safeFileName(validatedFile.name);
      const filePath = `${currentUser.id}/${Date.now()}-${originalName}`;

      uploadMessage.textContent = 'Uploading file...';
      uploadMessage.className = 'message muted';

      const { data, error } = await supabase
        .storage
        .from('uploads')
        .upload(filePath, validatedFile, {
          cacheControl: '3600',
          upsert: false,
          contentType: validatedFile.type || 'application/octet-stream'
        });

      if (error) {
        uploadMessage.textContent = `Upload failed: ${error.message}`;
        uploadMessage.className = 'message error';
        return;
      }

      uploadMessage.textContent = 'Upload successful. Next we will connect PDF processing.';
      uploadMessage.className = 'message success';

      fileInfo.style.display = 'block';
      fileInfo.innerHTML += `<br><strong>Stored Path:</strong> ${data.path}`;
    }

    logoutBtn.addEventListener('click', async () => {
      await supabase.auth.signOut();
      window.location.href = '/';
    });

    checkBtn.addEventListener('click', validateSelectedFile);
    uploadBtn.addEventListener('click', uploadFile);
    clearBtn.addEventListener('click', resetFileView);

    chatFile.addEventListener('change', () => {
      validatedFile = null;
      uploadMessage.textContent = 'File selected. Click "Validate File".';
      uploadMessage.className = 'message muted';
    });

    loadUser();
  </script>
</body>
</html>
