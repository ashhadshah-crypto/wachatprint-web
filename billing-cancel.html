<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Billing Cancelled | WAChatPrint</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #f8fafc;
      color: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 640px;
      background: white;
      border-radius: 20px;
      padding: 32px;
      border: 1px solid #e2e8f0;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
      text-align: center;
    }
    h1 {
      font-size: 32px;
      margin-bottom: 12px;
    }
    p {
      color: #475569;
      line-height: 1.7;
      margin-bottom: 12px;
    }
    .actions {
      margin-top: 22px;
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-block;
      border: none;
      background: #2563eb;
      color: white;
      padding: 12px 18px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
    }
    .btn-secondary {
      background: #e2e8f0;
      color: #0f172a;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Checkout cancelled</h1>
    <p>No payment was completed.</p>
    <p>You can return to your dashboard and upgrade again whenever you are ready.</p>
    <div class="actions">
      <a class="btn" href="/dashboard.html">Back to Dashboard</a>
      <a class="btn btn-secondary" href="/">Back to Home</a>
    </div>
  </div>
</body>
</html>
