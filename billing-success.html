<!DOCTYPE html>
<html>
<head>
  <title>Payment Success</title>
</head>
<body>
  <h2>Payment Successful</h2>
  <p>Verifying your subscription... please wait.</p>

  <script>
    async function verify() {
      try {
        const params = new URLSearchParams(window.location.search);
        const sessionId = params.get("session_id");

        if (!sessionId) {
          document.body.innerHTML = "<h3>Missing session ID</h3>";
          return;
        }

        const res = await fetch("/verify-checkout-session", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ session_id: sessionId })
        });

        const data = await res.json();

        if (data.success) {
          document.body.innerHTML = "<h2>Subscription Activated ✅</h2><p>Redirecting to dashboard...</p>";
          setTimeout(() => {
            window.location.href = "/dashboard.html";
          }, 2000);
        } else {
          document.body.innerHTML = "<h3>Verification failed. Please contact support.</h3>";
        }

      } catch (err) {
        document.body.innerHTML = "<h3>Error verifying subscription</h3>";
      }
    }

    verify();
  </script>
</body>
</html>
