<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Billing Success | WAChatPrint</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #f8fafc;
      color: #0f172a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .site-footer {
      margin-top: 22px;
      text-align: center;
      color: #64748b;
      font-size: 14px;
      line-height: 1.8;
    }
    .site-footer a {
      color: #2563eb;
      text-decoration: none;
    }
    .card {
      width: 100%;
      max-width: 640px;
      background: white;
      border-radius: 20px;
      padding: 32px;
      border: 1px solid #e2e8f0;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
      text-align: center;
    }
    h1 {
      font-size: 32px;
      margin-bottom: 12px;
    }
    p {
      color: #475569;
      line-height: 1.7;
      margin-bottom: 12px;
    }
    .actions {
      margin-top: 22px;
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-block;
      border: none;
      background: #2563eb;
      color: white;
      padding: 12px 18px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
    }
    .btn-secondary {
      background: #e2e8f0;
      color: #0f172a;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Payment received</h1>
    <p>Your checkout was completed successfully.</p>
    <p>Your plan will update shortly after Stripe sends the subscription webhook.</p>
    <div class="actions">
      <a class="btn" href="/dashboard.html">Go to Dashboard</a>
      <a class="btn btn-secondary" href="/">Back to Home</a>
    </div>
  </div>
  <div class="site-footer">
    <a href="/">Home</a> ·
    <a href="/privacy.html">Privacy Policy</a> ·
    <a href="/terms.html">Terms of Service</a> ·
    <a href="/refund.html">Refund Policy</a> ·
    <a href="/cancellation.html">Cancellation Policy</a>
  </div>
</body>
</html>
